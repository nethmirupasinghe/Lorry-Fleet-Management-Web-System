<html lang="en">
<head>

  <title>Lorry Fleet Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
     #entranceScreen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #0B2545;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    overflow: hidden;
  }

  .entranceContent {
    text-align: center;
    color: #FFFFFF;
    opacity: 0;
    transform: translateY(40px);
    animation: fadeSlideIn 1s forwards;
  }

  #entranceScreen h1 {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 700;
    font-size: 3rem;
    margin-bottom: 40px;
  }

  #enterBtn {
    background-color: #17BEBB;
    border: none;
    color: #0B2545;
    padding: 15px 45px;
    font-size: 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 0 10px #17BEBB99;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }

  #enterBtn:hover {
    box-shadow: 0 0 25px #17BEBBcc;
    transform: scale(1.05);
  }

  @keyframes fadeSlideIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #3498db;
      --accent-color: #e74c3c;
      --light-color: #ecf0f1;
      --dark-color: #2c3e50;
      --success-color: #27ae60;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
  
    body {
  font-family: 'Roboto', sans-serif;
  background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Tea_factory%2C_Tukuyu_%282486303150%29.jpg/1200px-Tea_factory%2C_Tukuyu_%282486303150%29.jpg?20121101063446') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
  padding: 40px 20px;
  color: var(--dark-color);
}

    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeInUp 0.6s ease;
    }
    
    .header {
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 25px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 24px;
      margin: 0;
    }
    
    .header i {
      font-size: 32px;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .content {
      padding: 30px;
    }
    
    .search-section {
      margin-bottom: 30px;
      position: relative;
    }
    
    .search-section label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--primary-color);
    }
    
    .select-wrapper {
      position: relative;
    }
    
    .select-wrapper::after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      color: var(--primary-color);
      pointer-events: none;
    }
    
    select {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      appearance: none;
      background-color: white;
      transition: var(--transition);
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
      background-color: var(--secondary-color);
      color: white;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    button:hover {
      background-color: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .output {
      margin-top: 30px;
      border-radius: 8px;
      background: white;
      color: var(--dark-color);
      font-size: 15px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: none;
    }
    
    .output-header {
      background: var(--primary-color);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .output-header h3 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 18px;
      margin: 0;
    }
    
    .output-header i {
      font-size: 20px;
    }
    
    .output-content {
      padding: 20px;
    }
    
    .output-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .output-table tr:nth-child(even) {
      background-color: #f8f9fa;
    }
    
    .output-table td {
      padding: 12px 15px;
      border-bottom: 1px solid #e9ecef;
      vertical-align: top;
    }
    
    .output-table td:first-child {
      font-weight: 500;
      width: 40%;
      color: var(--primary-color);
    }
    
    .no-data {
      text-align: center;
      padding: 30px;
      color: var(--accent-color);
      font-weight: 500;
    }
    
    .no-data i {
      font-size: 40px;
      margin-bottom: 15px;
      display: block;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @media (max-width: 768px) {
      body {
        padding: 20px 10px;
      }
      
      .container {
        border-radius: 8px;
      }
      
      .header {
        padding: 20px;
      }
      
      .content {
        padding: 20px;
      }
      
      .output-table td {
        padding: 10px;
        font-size: 14px;
      }
    }
    
    /* Status indicator */
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .status-active {
      background-color: var(--success-color);
    }
    
    .status-inactive {
      background-color: var(--accent-color);
    }
    
    /* Floating action button */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background-color: var(--accent-color);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: var(--transition);
      z-index: 100;
    }
    
    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>

   function getLorryDetails() {
      const regNumber = document.getElementById("regNumber").value.trim().toUpperCase();
      const output = document.getElementById("lorryDetails");
      const outputContent = document.getElementById("outputContent");

      if (regNumber === "") {
        output.style.display = "none";
        return;
      }

      if (lorryData[regNumber]) {
        const data = lorryData[regNumber];
        
        outputContent.innerHTML = `
          <table class="output-table">
            <tr><td>Registration Number:</td><td>${data.lorryRegistrationNumber}</td></tr>
            <tr><td>Make:</td><td>${data.make}</td></tr>
            <tr><td>Model:</td><td>${data.model}</td></tr>
            <tr><td>Year:</td><td>${data.yearOfManufacture}</td></tr>
            <tr><td>Fuel Type:</td><td>${data.fuelType}</td></tr>
            <tr><td>Engine No:</td><td>${data.engineNo}</td></tr>
            <tr><td>Chassis No:</td><td>${data.chassisNo}</td></tr>
            <tr><td>License Number:</td><td>${data.licenseNumber || 'N/A'}</td></tr>
            <tr><td>Purchase Date:</td><td>${data.dateOfPurchase || 'N/A'}</td></tr>
            <tr><td>Purchase Cost:</td><td>${data.purchaseCost || 'N/A'}</td></tr>
            <tr><td>Market Value:</td><td>${data.marketValue || 'N/A'}</td></tr>
            <tr><td>Transfer Date:</td><td>${data.transferedDate || 'N/A'}</td></tr>
            <tr><td>Book Value:</td><td>${data.bookvalue || 'No records available'}</td></tr>
          </table>
        `;
        output.style.display = "block";
      } else {
        outputContent.innerHTML = `
          <div class="no-data">
            <i class="fas fa-exclamation-circle"></i>
            <p>No details found for registration number: ${regNumber}</p>
          </div>
        `;
        output.style.display = "block";
      }
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    // Show the output section when a vehicle is selected
    document.getElementById('regNumber').addEventListener('change', function() {
      if (this.value !== "") {
        document.getElementById('lorryDetails').style.display = 'block';
      }
    });
  </script>
